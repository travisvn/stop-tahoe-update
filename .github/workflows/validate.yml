name: Validate & Lint

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🧪 Validate configuration profiles
        run: |
          echo "Validating .mobileconfig files..."
          find profiles -name "*.mobileconfig" -print0 | while IFS= read -r -d '' file; do
            echo "Checking $file"
            plutil -lint "$file"
          done

      - name: 🧰 Lint shell scripts
        run: |
          echo "Linting shell scripts..."
          brew install shellcheck || true
          shellcheck scripts/*.sh

      - name: 🔒 Generate SHA-256 checksums
        run: |
          echo "Generating checksums for installable artifacts..."
          mkdir -p checksums
          find profiles scripts -type f \( -name "*.sh" -o -name "*.mobileconfig" \) | while read -r file; do
            shasum -a 256 "$file" >> checksums/SHA256SUMS.txt
          done
          cat checksums/SHA256SUMS.txt

      - name: ✅ Summary
        run: echo "Validation complete — all checks passed."
